<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turbo Highway GT</title>
  <style>
    :root {
      --bg1: #040b16;
      --bg2: #0b1d39;
      --cyan: #67e8ff;
      --pink: #ff54d9;
      --orange: #ff9f6b;
      --yellow: #ffe066;
      --white: #f5f8ff;
      --glass: rgba(8, 16, 32, 0.82);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% 20%, rgba(103,232,255,0.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,84,217,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      background-image: radial-gradient(circle, rgba(255,255,255,0.85) 1px, transparent 1.5px);
      background-size: 160px 160px;
      opacity: 0.12;
      pointer-events: none;
      animation: stars 26s linear infinite;
    }

    .stars::before { background-size: 120px 120px; animation-duration: 18s; opacity: 0.08; }
    .stars::after { background-size: 220px 220px; animation-duration: 34s; opacity: 0.07; }

    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(160px); }
    }

    .game-shell {
      position: relative;
      width: min(94vw, 510px);
    }

    .hud {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .card {
      min-width: 112px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.24);
      backdrop-filter: blur(10px);
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.68);
    }

    .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
    }

    .track-wrap {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      perspective: 1000px;
    }

    .track {
      position: relative;
      width: min(92vw, 430px);
      height: min(78vh, 760px);
      overflow: hidden;
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.08), transparent 20%),
        linear-gradient(180deg, #162847 0%, #101d33 22%, #0b1322 100%);
      box-shadow:
        0 0 0 1px rgba(103,232,255,0.15),
        0 24px 60px rgba(0,0,0,0.45),
        0 0 45px rgba(103,232,255,0.12);
    }

    .horizon-glow {
      position: absolute;
      left: 50%;
      top: 44px;
      width: 70%;
      height: 80px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(103,232,255,0.18), transparent 68%);
      filter: blur(14px);
      z-index: 0;
    }

    .road {
      position: absolute;
      left: 50%;
      bottom: -16px;
      width: 78%;
      height: 92%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #394760 0%, #1d2737 16%, #151b24 100%);
      clip-path: polygon(29% 0%, 71% 0%, 100% 100%, 0% 100%);
      box-shadow: inset 0 0 45px rgba(255,255,255,0.04);
      z-index: 1;
    }

    .road::before,
    .road::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      background: linear-gradient(180deg, rgba(103,232,255,0.45), rgba(255,84,217,0.18));
      opacity: 0.42;
    }

    .road::before { left: 11%; }
    .road::after { right: 11%; }

    .lane-divider {
      position: absolute;
      left: 50%;
      top: 0;
      width: 100%;
      height: 100%;
      transform: translateX(-50%);
      z-index: 2;
      pointer-events: none;
    }

    .dash {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.18));
      box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    .car {
      position: absolute;
      z-index: 5;
      transition: left 0.11s ease-out;
      filter: drop-shadow(0 16px 16px rgba(0,0,0,0.33));
    }

    .car.rear {
      width: 94px;
      height: 124px;
    }

    .car.front {
      width: 90px;
      height: 118px;
    }

    .car-shell {
      position: absolute;
      inset: 0;
      border-radius: 26px 26px 18px 18px;
      overflow: hidden;
    }

    .rear .car-shell {
      background: linear-gradient(180deg, #8bf2ff 0%, #37b8ff 45%, #0f64d1 100%);
      clip-path: polygon(20% 14%, 80% 14%, 92% 38%, 94% 85%, 75% 100%, 25% 100%, 6% 85%, 8% 38%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.22), inset 0 -18px 24px rgba(0,0,0,0.25);
    }

    .front .car-shell {
      background: linear-gradient(180deg, #ffc49f 0%, #ff7a7a 45%, #c72d5e 100%);
      clip-path: polygon(24% 0%, 76% 0%, 92% 28%, 94% 78%, 76% 100%, 24% 100%, 6% 78%, 8% 28%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18), inset 0 -16px 22px rgba(0,0,0,0.18);
    }

    .window {
      position: absolute;
      left: 24%;
      right: 24%;
      top: 17%;
      height: 36%;
      border-radius: 16px;
      background: linear-gradient(180deg, #182338, #2a3550 70%, #1e2438);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .rear .window::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 10%;
      bottom: 10%;
      width: 3px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
    }

    .hood {
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: 22%;
      height: 18%;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.18));
    }

    .rear .bumper,
    .front .bumper {
      position: absolute;
      left: 26%;
      right: 26%;
      bottom: 8%;
      height: 12%;
      border-radius: 999px;
    }

    .rear .bumper {
      background: linear-gradient(90deg, var(--pink), var(--yellow), var(--pink));
      box-shadow: 0 0 12px rgba(255,84,217,0.5);
    }

    .front .bumper {
      background: linear-gradient(90deg, #fff8d8, #ffd166, #fff8d8);
      box-shadow: 0 0 12px rgba(255,209,102,0.45);
    }

    .wheel {
      position: absolute;
      width: 12px;
      height: 30px;
      background: #0f1117;
      border-radius: 8px;
      top: 40%;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.05);
    }

    .wheel.left { left: 4px; }
    .wheel.right { right: 4px; }
    .wheel.back-left { left: 10px; bottom: 16px; top: auto; }
    .wheel.back-right { right: 10px; bottom: 16px; top: auto; }

    .enemy, .coin, .boost {
      position: absolute;
      z-index: 4;
    }

    .coin {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff7bc, #ffd43b 58%, #ffb703 100%);
      box-shadow: 0 0 16px rgba(255, 212, 59, 0.58);
      border: 2px solid rgba(255,255,255,0.28);
      animation: spin 0.9s linear infinite;
    }

    .boost {
      width: 26px;
      height: 40px;
      clip-path: polygon(50% 0%, 100% 35%, 72% 100%, 28% 100%, 0 35%);
      background: linear-gradient(180deg, #f2fbff, #7ce8ff 46%, #1a9fff);
      box-shadow: 0 0 16px rgba(103,232,255,0.7);
      animation: pulse 0.85s ease-in-out infinite alternate;
    }

    @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(4,10,20,0.62), rgba(4,10,20,0.88));
      text-align: center;
    }

    .panel {
      width: min(100%, 350px);
      padding: 28px 24px;
      border-radius: 24px;
      background: rgba(7, 15, 28, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .panel h1 { margin: 0; font-size: 34px; }
    .panel p { line-height: 1.55; color: rgba(255,255,255,0.82); margin: 14px 0 0; }

    .accent {
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .btn {
      margin-top: 18px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      color: #04101d;
      background: linear-gradient(90deg, var(--cyan), #a3f7ff 46%, var(--pink));
      box-shadow: 0 10px 25px rgba(103,232,255,0.22);
    }

    .tips { margin-top: 14px; font-size: 13px; color: rgba(255,255,255,0.66); }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255, 90, 90, 0.28);
      opacity: 0;
      z-index: 9;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .flash.show { opacity: 1; }

    .paused-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 8;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
      display: none;
    }

    .show { display: inline-flex; }

    @media (max-width: 520px) {
      .game-shell { width: 96vw; }
      .card { min-width: 96px; }
      .value { font-size: 21px; }
      .track { height: 76vh; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="game-shell">
    <div class="hud">
      <div class="card"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="card"><div class="label">Best</div><div class="value" id="best">0</div></div>
      <div class="card"><div class="label">Speed</div><div class="value" id="speed">1.0x</div></div>
    </div>

    <div class="track-wrap">
      <div class="track" id="track">
        <div class="horizon-glow"></div>
        <div class="road"></div>
        <div class="lane-divider" id="laneDivider"></div>
        <div class="paused-badge" id="pausedBadge">Paused</div>
        <div class="flash" id="flash"></div>

        <div class="car rear" id="player">
          <div class="wheel left"></div>
          <div class="wheel right"></div>
          <div class="wheel back-left"></div>
          <div class="wheel back-right"></div>
          <div class="car-shell"></div>
          <div class="window"></div>
          <div class="hood"></div>
          <div class="bumper"></div>
        </div>

        <div class="overlay" id="overlay">
          <div class="panel">
            <h1><span class="accent">Turbo</span> Highway GT</h1>
            <p>
              Upgraded with more realistic SVG sports cars, steering tilt, roadside neon lights,
              and a stronger highway perspective.
            </p>
            <button class="btn" id="startBtn">Start Game</button>
            <div class="tips">Move with ← → or A D • Press P to pause • Tap left/right on mobile</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', () => {
    const track = document.getElementById('track');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const speedEl = document.getElementById('speed');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const laneDivider = document.getElementById('laneDivider');
    const flash = document.getElementById('flash');
    const pausedBadge = document.getElementById('pausedBadge');

    const lanes = [0.28, 0.5, 0.72];
    let laneIndex = 1;
    let gameRunning = false;
    let paused = false;
    let score = 0;
    let best = Number(localStorage.getItem('neon-highway-best') || 0);
    let roadOffset = 0;
    let baseSpeed = 6;
    let gameSpeed = 6;
    let spawnTick = 0;
    let coinTick = 0;
    let boostTick = 0;
    let frameId = null;
    let lastTime = 0;
    const objects = [];

    bestEl.textContent = best;

    function roadCenterY(t) {
      return 70 + t * (track.clientHeight - 90);
    }

    function laneWidthAt(t) {
      const top = track.clientWidth * 0.15;
      const bottom = track.clientWidth * 0.25;
      return top + (bottom - top) * t;
    }

    function laneX(index, t, objWidth = 90) {
      const center = track.clientWidth / 2;
      const spacing = laneWidthAt(t);
      const laneCenter = center + (index - 1) * spacing;
      return laneCenter - objWidth / 2;
    }

    function createDashes() {
      laneDivider.innerHTML = '';
      for (let i = 0; i < 11; i++) {
        const dash = document.createElement('div');
        dash.className = 'dash';
        laneDivider.appendChild(dash);
      }
    }

    function positionDashes() {
      [...laneDivider.children].forEach((dash, i) => {
        const raw = ((i * 110 + roadOffset) % 1100) / 1100;
        const t = raw;
        const y = roadCenterY(t);
        const scale = 0.35 + t * 1.15;
        dash.style.top = `${y}px`;
        dash.style.width = `${4 + t * 8}px`;
        dash.style.height = `${24 + t * 44}px`;
        dash.style.opacity = `${0.35 + t * 0.5}`;
        dash.style.transform = `translateX(-50%) scale(${scale})`;
      });
    }

    function placePlayer() {
      const t = 0.9;
      player.style.left = `${laneX(laneIndex, t, player.offsetWidth)}px`;
      player.style.top = `${roadCenterY(t) - player.offsetHeight / 2}px`;
      const tilt = laneIndex === 0 ? -7 : laneIndex === 2 ? 7 : 0;
      player.style.transform = `rotate(${tilt}deg)`;
    }px`;
      player.style.top = `${roadCenterY(t) - player.offsetHeight / 2}px`;
    }

    function createEnemyCar() {
      const enemy = document.createElement('div');
      enemy.className = 'enemy car front';
      enemy.innerHTML = carSVG('front');
      return enemy;
    }

    function createPlayerCar() {
      player.innerHTML = carSVG('rear');
    }

    function carSVG(view) {
      if (view === 'rear') {
        return `
          <svg viewBox="0 0 120 170" width="100%" height="100%" aria-hidden="true">
            <defs>
              <linearGradient id="bodyRear" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#9ef7ff"/>
                <stop offset="45%" stop-color="#31baff"/>
                <stop offset="100%" stop-color="#0f60d2"/>
              </linearGradient>
              <linearGradient id="glassRear" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1b2940"/>
                <stop offset="100%" stop-color="#31425f"/>
              </linearGradient>
              <linearGradient id="tailRear" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#ff44bf"/>
                <stop offset="50%" stop-color="#ffe066"/>
                <stop offset="100%" stop-color="#ff44bf"/>
              </linearGradient>
            </defs>
            <rect x="11" y="44" width="13" height="42" rx="6" fill="#11141b"/>
            <rect x="96" y="44" width="13" height="42" rx="6" fill="#11141b"/>
            <rect x="18" y="110" width="13" height="38" rx="6" fill="#11141b"/>
            <rect x="89" y="110" width="13" height="38" rx="6" fill="#11141b"/>
            <path d="M28 20 L92 20 Q106 22 111 46 L114 124 Q113 145 96 156 L24 156 Q8 146 6 124 L9 46 Q14 22 28 20 Z" fill="url(#bodyRear)" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
            <path d="M39 36 L81 36 Q89 36 93 45 L96 84 Q95 92 87 96 L33 96 Q25 92 24 84 L27 45 Q31 36 39 36 Z" fill="url(#glassRear)"/>
            <rect x="58" y="40" width="4" height="50" rx="2" fill="rgba(255,255,255,.18)"/>
            <path d="M33 104 Q60 95 87 104 L84 130 Q60 136 36 130 Z" fill="rgba(255,255,255,.08)"/>
            <rect x="34" y="132" width="52" height="14" rx="7" fill="url(#tailRear)"/>
            <ellipse cx="60" cy="150" rx="24" ry="5" fill="rgba(0,0,0,.28)"/>
          </svg>
        `;
      }
      return `
        <svg viewBox="0 0 120 170" width="100%" height="100%" aria-hidden="true">
          <defs>
            <linearGradient id="bodyFront" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffd4b5"/>
              <stop offset="45%" stop-color="#ff7b7b"/>
              <stop offset="100%" stop-color="#c32d5b"/>
            </linearGradient>
            <linearGradient id="glassFront" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1e2940"/>
              <stop offset="100%" stop-color="#2e3d5a"/>
            </linearGradient>
            <linearGradient id="lightFront" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#fff7d6"/>
              <stop offset="50%" stop-color="#ffd166"/>
              <stop offset="100%" stop-color="#fff7d6"/>
            </linearGradient>
          </defs>
          <rect x="11" y="44" width="13" height="42" rx="6" fill="#11141b"/>
          <rect x="96" y="44" width="13" height="42" rx="6" fill="#11141b"/>
          <rect x="18" y="110" width="13" height="38" rx="6" fill="#11141b"/>
          <rect x="89" y="110" width="13" height="38" rx="6" fill="#11141b"/>
          <path d="M29 8 L91 8 Q106 11 112 36 L114 118 Q111 145 91 162 L29 162 Q10 145 6 118 L8 36 Q14 11 29 8 Z" fill="url(#bodyFront)" stroke="rgba(255,255,255,.28)" stroke-width="2"/>
          <path d="M37 28 L83 28 Q91 28 95 38 L96 84 Q95 93 86 98 L34 98 Q25 93 24 84 L25 38 Q29 28 37 28 Z" fill="url(#glassFront)"/>
          <path d="M34 110 Q60 98 86 110 L80 144 Q60 150 40 144 Z" fill="rgba(255,255,255,.08)"/>
          <rect x="36" y="140" width="48" height="11" rx="5.5" fill="url(#lightFront)"/>
          <ellipse cx="60" cy="157" rx="25" ry="5" fill="rgba(0,0,0,.25)"/>
        </svg>
      `;
    }

    function spawnEnemy() {
      const el = createEnemyCar();
      const lane = Math.floor(Math.random() * 3);
      const item = { type: 'enemy', el, lane, t: 0.05, w: 90, h: 118, x: 0, y: 0 };
      track.appendChild(el);
      objects.push(item);
      renderObject(item);
    }

    function spawnCoin() {
      const el = document.createElement('div');
      el.className = 'coin';
      const lane = Math.floor(Math.random() * 3);
      const item = { type: 'coin', el, lane, t: 0.08, w: 26, h: 26, x: 0, y: 0 };
      track.appendChild(el);
      objects.push(item);
      renderObject(item);
    }

    function spawnBoost() {
      const el = document.createElement('div');
      el.className = 'boost';
      const lane = Math.floor(Math.random() * 3);
      const item = { type: 'boost', el, lane, t: 0.09, w: 26, h: 40, x: 0, y: 0 };
      track.appendChild(el);
      objects.push(item);
      renderObject(item);
    }

    function renderObject(obj) {
      const scale = 0.48 + obj.t * 0.92;
      obj.x = laneX(obj.lane, obj.t, obj.w * scale);
      obj.y = roadCenterY(obj.t) - (obj.h * scale) / 2;
      obj.el.style.left = `${obj.x}px`;
      obj.el.style.top = `${obj.y}px`;
      obj.el.style.transform = `scale(${scale})`;
      obj.el.style.transformOrigin = 'top left';
      obj.renderW = obj.w * scale;
      obj.renderH = obj.h * scale;
    }

    function getPlayerBox() {
      return {
        x: player.offsetLeft + 16,
        y: player.offsetTop + 12,
        w: player.offsetWidth - 32,
        h: player.offsetHeight - 16
      };
    }

    function intersects(a, b) {
      return !(a.x + a.w < b.x || a.x > b.x + b.w || a.y + a.h < b.y || a.y > b.y + b.h);
    }

    function removeObject(index) {
      objects[index].el.remove();
      objects.splice(index, 1);
    }

    function flashDamage() {
      flash.classList.add('show');
      setTimeout(() => flash.classList.remove('show'), 120);
    }

    function addScore(amount) {
      score += amount;
      scoreEl.textContent = score;
      speedEl.textContent = `${Math.max(1, gameSpeed / 6).toFixed(1)}x`;
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(frameId);
      if (score > best) {
        best = score;
        localStorage.setItem('neon-highway-best', String(best));
        bestEl.textContent = best;
      }
      overlay.innerHTML = `
        <div class="panel">
          <h1>Game Over</h1>
          <p>Your score: <strong>${score}</strong><br>Best score: <strong>${best}</strong></p>
          <button class="btn" id="restartBtn">Play Again</button>
          <div class="tips">Coins give +5 • Boosts give +10 and extra speed</div>
        </div>
      `;
      overlay.style.display = 'grid';
      document.getElementById('restartBtn').addEventListener('click', startGame);
    }

    function resetGame() {
      objects.forEach(o => o.el.remove());
      objects.length = 0;
      laneIndex = 1;
      score = 0;
      baseSpeed = 6;
      gameSpeed = 6;
      spawnTick = 0;
      coinTick = 0;
      boostTick = 0;
      roadOffset = 0;
      paused = false;
      pausedBadge.classList.remove('show');
      overlay.style.display = 'none';
      scoreEl.textContent = '0';
      speedEl.textContent = '1.0x';
      placePlayer();
      positionDashes();
    }

    function startGame() {
      resetGame();
      gameRunning = true;
      lastTime = performance.now();
      frameId = requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!gameRunning) return;
      frameId = requestAnimationFrame(loop);
      if (paused) { lastTime = now; return; }

      const delta = Math.min(1.8, (now - lastTime) / 16.6667);
      lastTime = now;

      baseSpeed += 0.0024 * delta;
      gameSpeed += (baseSpeed - gameSpeed) * 0.02 * delta;
      roadOffset += gameSpeed * delta * 7;
      positionDashes();
      addScore(Math.floor(delta));

      spawnTick += delta;
      coinTick += delta;
      boostTick += delta;

      if (spawnTick > Math.max(24, 52 - gameSpeed * 3.2)) {
        spawnEnemy();
        spawnTick = 0;
      }
      if (coinTick > 78) {
        spawnCoin();
        coinTick = 0;
      }
      if (boostTick > 220) {
        spawnBoost();
        boostTick = 0;
      }

      const playerBox = getPlayerBox();

      for (let i = objects.length - 1; i >= 0; i--) {
        const obj = objects[i];
        const factor = obj.type === 'enemy' ? 0.0076 : obj.type === 'coin' ? 0.0061 : 0.0065;
        obj.t += gameSpeed * delta * factor;
        renderObject(obj);

        const hit = {
          x: obj.x + 8,
          y: obj.y + 8,
          w: obj.renderW - 16,
          h: obj.renderH - 14
        };

        if (intersects(playerBox, hit)) {
          if (obj.type === 'enemy') {
            flashDamage();
            endGame();
            return;
          }
          if (obj.type === 'coin') {
            addScore(5);
            removeObject(i);
            continue;
          }
          if (obj.type === 'boost') {
            gameSpeed += 2.5;
            addScore(10);
            removeObject(i);
            continue;
          }
        }

        if (obj.t > 1.08) removeObject(i);
      }
    }

    function moveLeft() {
      if (!gameRunning || paused) return;
      laneIndex = Math.max(0, laneIndex - 1);
      placePlayer();
    }

    function moveRight() {
      if (!gameRunning || paused) return;
      laneIndex = Math.min(2, laneIndex + 1);
      placePlayer();
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'arrowleft' || key === 'a') moveLeft();
      if (key === 'arrowright' || key === 'd') moveRight();
      if (key === 'p' && gameRunning) {
        paused = !paused;
        pausedBadge.classList.toggle('show', paused);
      }
      if (key === 'enter' && !gameRunning && overlay.style.display !== 'none') startGame();
    });

    track.addEventListener('click', (e) => {
      if (!gameRunning || paused) return;
      const rect = track.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x < rect.width / 2) moveLeft(); else moveRight();
    });

    window.addEventListener('resize', () => {
      placePlayer();
      positionDashes();
      objects.forEach(renderObject);
    });

    createPlayerCar();
    createDashes();
    positionDashes();
    placePlayer();
    startBtn.addEventListener('click', startGame);
});
  </script>
</body>
</html>
