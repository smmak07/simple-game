<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turbo Highway GT</title>
  <style>
    :root {
      --bg-top: #07162d;
      --bg-bottom: #020916;
      --cyan: #66ecff;
      --pink: #ff59d6;
      --yellow: #ffd86b;
      --white: #f5f8ff;
      --panel: rgba(7, 15, 28, 0.82);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% 20%, rgba(102,236,255,0.15), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(255,89,214,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1.4px);
      background-size: 150px 150px;
      opacity: 0.12;
      animation: starMove 24s linear infinite;
    }

    .stars::before { background-size: 220px 220px; opacity: 0.08; animation-duration: 34s; }
    .stars::after { background-size: 100px 100px; opacity: 0.09; animation-duration: 18s; }

    @keyframes starMove {
      from { transform: translateY(0); }
      to { transform: translateY(140px); }
    }

    .game-shell {
      width: min(96vw, 520px);
      position: relative;
      z-index: 1;
    }

    .hud {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .card {
      min-width: 110px;
      padding: 12px 16px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 34px rgba(0,0,0,
