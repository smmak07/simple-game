<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Highway Rush</title>
  <style>
    :root {
      --bg1: #040b16;
      --bg2: #0b1d39;
      --cyan: #67e8ff;
      --pink: #ff54d9;
      --orange: #ff9f6b;
      --yellow: #ffe066;
      --white: #f5f8ff;
      --glass: rgba(8, 16, 32, 0.82);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 50% 20%, rgba(103,232,255,0.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,84,217,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    .stars,
    .stars::before,
    .stars::after {
      position: fixed;
      inset: 0;
      content: "";
      background-image: radial-gradient(circle, rgba(255,255,255,0.85) 1px, transparent 1.5px);
      background-size: 160px 160px;
      opacity: 0.12;
      pointer-events: none;
      animation: stars 26s linear infinite;
    }

    .stars::before { background-size: 120px 120px; animation-duration: 18s; opacity: 0.08; }
    .stars::after { background-size: 220px 220px; animation-duration: 34s; opacity: 0.07; }

    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(160px); }
    }

    .game-shell {
      position: relative;
      width: min(94vw, 510px);
    }

    .hud {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .card {
      min-width: 112px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.24);
      backdrop-filter: blur(10px);
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.68);
    }

    .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
    }

    .track-wrap {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      perspective: 1000px;
    }

    .track {
      position: relative;
      width: min(92vw, 430px);
      height: min(78vh, 760px);
      overflow: hidden;
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.08), transparent 20%),
        linear-gradient(180deg, #162847 0%, #101d33 22%, #0b1322 100%);
      box-shadow:
        0 0 0 1px rgba(103,232,255,0.15),
        0 24px 60px rgba(0,0,0,0.45),
        0 0 45px rgba(103,232,255,0.12);
    }

    .horizon-glow {
      position: absolute;
      left: 50%;
      top: 44px;
      width: 70%;
      height: 80px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(103,232,255,0.18), transparent 68%);
      filter: blur(14px);
      z-index: 0;
    }

    .road {
      position: absolute;
      left: 50%;
      bottom: -16px;
      width: 78%;
      height: 92%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #394760 0%, #1d2737 16%, #151b24 100%);
      clip-path: polygon(29% 0%, 71% 0%, 100% 100%, 0% 100%);
      box-shadow: inset 0 0 45px rgba(255,255,255,0.04);
      z-index: 1;
    }

    .road::before,
    .road::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      background: linear-gradient(180deg, rgba(103,232,255,0.45), rgba(255,84,217,0.18));
      opacity: 0.42;
    }

    .road::before { left: 11%; }
    .road::after { right: 11%; }

    .lane-divider {
      position: absolute;
      left: 50%;
      top: 0;
      width: 100%;
      height: 100%;
      transform: translateX(-50%);
      z-index: 2;
      pointer-events: none;
    }

    .dash {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.18));
      box-shadow: 0 0 12px rgba(255,255,255,0.25);
    }

    .car {
      position: absolute;
      z-index: 5;
      transition: left 0.11s ease-out;
      filter: drop-shadow(0 16px 16px rgba(0,0,0,0.33));
    }

    .car.rear {
      width: 94px;
      height: 124px;
    }

    .car.front {
      width: 90px;
      height: 118px;
    }

    .car-shell {
      position: absolute;
      inset: 0;
      border-radius: 26px 26px 18px 18px;
      overflow: hidden;
    }

    .rear .car-shell {
      background: linear-gradient(180deg, #8bf2ff 0%, #37b8ff 45%, #0f64d1 100%);
      clip-path: polygon(20% 14%, 80% 14%, 92% 38%, 94% 85%, 75% 100%, 25% 100%, 6% 85%, 8% 38%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.22), inset 0 -18px 24px rgba(0,0,0,0.25);
    }

    .front .car-shell {
      background: linear-gradient(180deg, #ffc49f 0%, #ff7a7a 45%, #c72d5e 100%);
      clip-path: polygon(24% 0%, 76% 0%, 92% 28%, 94% 78%, 76% 100%, 24% 100%, 6% 78%, 8% 28%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18), inset 0 -16px 22px rgba(0,0,0,0.18);
    }

    .window {
      position: absolute;
      left: 24%;
      right: 24%;
      top: 17%;
      height: 36%;
      border-radius: 16px;
      background: linear-gradient(180deg, #182338, #2a3550 70%, #1e2438);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    }

    .rear .window::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 10%;
      bottom: 10%;
      width: 3px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
    }

    .hood {
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: 22%;
      height: 18%;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.18));
    }

    .rear .bumper,
    .front .bumper {
      position: absolute;
      left: 26%;
      right: 26%;
      bottom: 8%;
      height: 12%;
      border-radius: 999px;
    }
